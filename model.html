<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AR CAD Model Viewer</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
  <link rel="stylesheet" href="./model.css" />
</head>
<body>
  <main class="page">
    <section class="card">
      <h1>AR CAD Model Viewer</h1>
      <p class="lead">スマートフォンでこのページを開き、「ARで表示」を押すと目の前に3Dモデルを表示できます。</p>

      <model-viewer
        class="viewer"
        src="./models/TASD00_detector_geometry_from_summary.glb"
        ios-src="./models/TASD00_detector_geometry_from_summary.usdz"
        alt="3D CAD model"
        ar
        ar-modes="webxr scene-viewer quick-look"
        camera-controls
        auto-rotate
        shadow-intensity="1"
        exposure="1">
        <button slot="ar-button" class="ar-button">ARで表示</button>
      </model-viewer>

      <div class="info">
        <h2>使い方</h2>
        <ol>
          <li><code>models/sample.glb</code> を自分のGLBファイルに置き換える。</li>
          <li>iPhone対応が必要なら <code>models/sample.usdz</code> も置く。</li>
          <li>GitHub Pagesを有効化する。</li>
          <li>公開URLをQRコード化する。</li>
        </ol>
      </div>
    </section>
  </main>
</body>
</html>
